services:
  api:
    build:
      context: .
      args:
        # PUBLIC Clerk key — baked into the dashboard bundle at build time.
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:-}
    ports:
      - "8000:8000"
    environment:
      NETLOGIC_JWT_SECRET: ${NETLOGIC_JWT_SECRET}
      NETLOGIC_ADMIN_KEY: ${NETLOGIC_ADMIN_KEY}
      # REQUIRED with Postgres: master key encrypting each org's stored API keys.
      # Without it the server fails closed and refuses to save keys. Generate with:
      #   python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      NETLOGIC_SECRETS_KEY: ${NETLOGIC_SECRETS_KEY}
      NETLOGIC_ANTHROPIC_API_KEY: ${NETLOGIC_ANTHROPIC_API_KEY:-}
      NETLOGIC_CORS_ORIGINS: ${NETLOGIC_CORS_ORIGINS:-http://localhost:5173}
      NETLOGIC_NO_BROWSER: "1"
      # Auth — Clerk (human logins) + Postgres (system of record). Leave the OIDC
      # issuer / DB URL unset to run in-memory without persistent multi-tenancy.
      NETLOGIC_OIDC_ISSUER: ${NETLOGIC_OIDC_ISSUER:-}
      NETLOGIC_OIDC_AUTHORIZED_PARTIES: ${NETLOGIC_OIDC_AUTHORIZED_PARTIES:-}
      NETLOGIC_DATABASE_URL: ${NETLOGIC_DATABASE_URL:-postgresql://netlogic:netlogic@postgres:5432/netlogic}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - netlogic-data:/root/.netlogic
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: netlogic
      POSTGRES_PASSWORD: netlogic
      POSTGRES_DB: netlogic
    ports:
      - "5432:5432"
    volumes:
      - netlogic-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netlogic -d netlogic"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  netlogic-data:
  netlogic-pgdata:
